spring:
  cache:
    # type: hybrid # hybrid | redis | caffeine
    type: caffeine
  output:
    ansi:
      enabled: always
  application:
    name: loci
  profiles:
    active: "dev"
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
server:
  servlet:
    context-path: /api/v1
springdoc:
  api-docs:
    path: /api-docs

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
