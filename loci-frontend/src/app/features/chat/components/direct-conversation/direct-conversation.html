<main id="main-content" class="flex h-[calc(100vh-4rem)]">
  <section id="chat-conversation" class="flex-1 bg-white flex flex-col">

    <app-chat-header
      [chat]="chatInfo()"
      [showBackButton]="true"
      [features]="singleChatFeatures"
      (back)="onBack()"
      (profileClick)="onViewProfile()"
      (callClick)="onVoiceCall()"
      (videoClick)="onVideoCall()"
    />

    <!-- Messages -->
    <div
      #messageArea
      id="message-area"
      class="flex-1 overflow-y-auto p-4 space-y-4"
      (scroll)="onScroll($event)"
    >
      @if (state.loading()) {
        <div class="flex justify-center py-4">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-neutral-500"></div>
        </div>
      }

      @for (msg of messages(); track msg.messageId; let last = $last) {
        <app-message-bubble
          [isOwn]="msg.owner"
          [message]="msg"
          [avatarUrl]="getMessageSenderAvatarUrl(msg)"
          [senderName]="getMessageSenderName(msg)"
          [attr.data-message-id]="msg.messageId"
          [attr.data-incoming]="!msg.owner"
          (download)="onDownloadAttachment($event)"
          (contextMenu)="onMessageContextMenu($event)"
          [isLast]="last"
        />
      }
    </div>

    <!-- Error -->
    @if (uiError() !== null) {
      <app-error-alert [error]="uiError()" (dismiss)="state.clearError()" />
    }

    <!-- "Waiting for answer" overlay banner -->
    @if (isWaitingForAnswer()) {
      <div class="absolute inset-x-0 top-16 z-40 flex justify-center pointer-events-none">
        <div class="pointer-events-auto flex items-center gap-3 bg-gray-900/95 text-white
                    rounded-2xl px-5 py-3 shadow-2xl border border-gray-700">
          <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white shrink-0"></div>
          <span class="text-sm">Đang chờ đối phương trả lời...</span>
          <button (click)="onCancelWaiting()" class="ml-2 text-red-400 hover:text-red-300 text-xs underline">Huỷ</button>
        </div>
      </div>
    }

    <!-- Thông báo bị từ chối -->
    @if (callRejectedMsg()) {
      <div class="absolute inset-x-0 top-16 z-40 flex justify-center pointer-events-none">
        <div class="pointer-events-auto flex items-center gap-2 bg-red-600/90 text-white
                    rounded-2xl px-5 py-3 shadow-2xl text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          {{ callRejectedMsg() }}
        </div>
      </div>
    }

    <!-- Input -->
    <app-message-input
      [isDisabled]="isBlocked()"
      [isSending]="state.sendingMessage()"
      [isUploading]="state.uploadingFile()"
      (send)="onSendMessage($event)"
      (fileSelect)="onFileSelected($event)"
    />

    <!-- Video call overlay -->
    @if (isVideoCallOpen()) {
      <app-video-call
        [isOpen]="isVideoCallOpen()"
        [conversationId]="state.conversationId()!"
        [remoteUserId]="state.participant()?.type === 'one_to_one'
                          ? state.participant()!.messagingUser.userId
                          : ''"
        [withVideo]="callWithVideo()"
        [remoteAvatarUrl]="state.participant()?.avatarUrl ?? ''"
        [localAvatarUrl]="myAvatarUrl()"
        (close)="isVideoCallOpen.set(false)"
        (callEnded)="onCallEnded($event)"
      />
    }

  </section>
</main>

<!-- Incoming call modal — rendered outside the section so it floats globally -->
<app-incoming-call-modal
  [callInfo]="signalingService.incomingCallInfo()"
  (accept)="onAcceptIncomingCall()"
  (decline)="onRejectIncomingCall()"
/>
