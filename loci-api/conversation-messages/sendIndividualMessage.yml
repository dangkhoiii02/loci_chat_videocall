info:
  name: sendIndividualMessage
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/messages/individual/send"
  body:
    type: json
    data: |-
      {
        "conversationId": "{{conversation_id}}",
        "replyToMessageId": null, 
        "content": "A very new message", 
        "type": "text"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/conversations/group"
      method: POST
      body:
        type: json
        data: |-
          {
            "groupName": "",
            "profileImage": ""
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "id": "",
            "conversationType": "",
            "createdDate": ""
          }
